name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Capture TypeScript report
        run: |
          set +e
          npm run typecheck > typecheck-report.txt 2>&1
          echo $? > typecheck-exit-code.txt
          exit 0

      - name: Upload TypeScript report
        uses: actions/upload-artifact@v4
        with:
          name: horos-typecheck-report
          path: |
            typecheck-report.txt
            typecheck-exit-code.txt

      - name: Fail on TypeScript errors
        run: test "$(cat typecheck-exit-code.txt)" -eq 0

      - name: Lint Expo app
        run: npm run lint

      - name: Set up Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Type-check Supabase Edge Function
        run: deno check --config supabase/functions/horos-api/deno.json supabase/functions/horos-api/index.ts
