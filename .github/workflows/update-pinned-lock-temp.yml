name: Temporary pinned lock regeneration

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  update-lock:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: build/pin-mobile-toolchain-v1
      - uses: actions/setup-node@v4
        with:
          node-version: "20.19.4"
          cache: npm
      - run: npm install --global npm@10.8.2
      - run: npm install --package-lock-only --ignore-scripts
      - name: Commit synchronized lockfile
        shell: bash
        run: |
          if git diff --quiet -- package-lock.json; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package-lock.json
          git commit -m "build: synchronize Expo-compatible package lock"
          git push origin HEAD:build/pin-mobile-toolchain-v1
