name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Audit hosted deployment repository readiness
        shell: pwsh
        run: ./scripts/audit-hosted-deployment-readiness.ps1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check Expo and legacy Worker
        run: npm run typecheck

      - name: Lint Expo app
        run: npm run lint

      - name: Parse private-beta PowerShell preflight
        shell: pwsh
        run: |
          $content = Get-Content ./scripts/verify-private-beta-local.ps1 -Raw
          [scriptblock]::Create($content) | Out-Null

      - name: Set up Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Type-check Supabase Edge Function
        run: deno check --config supabase/functions/horos-api/deno.json supabase/functions/horos-api/index.ts

      - name: Test Astro gateway contract
        run: deno test --config supabase/functions/horos-api/deno.json supabase/functions/horos-api/astro_test.ts

      - name: Test Horos user-flow contract
        run: deno test --config supabase/functions/horos-api/deno.json supabase/functions/horos-api/user_flow_test.ts

      - name: Test RevenueCat webhook contract
        run: deno test --config supabase/functions/horos-api/deno.json supabase/functions/horos-api/revenuecat_test.ts

      - name: Test timezone horoscope periods
        run: deno test --config supabase/functions/horos-api/deno.json supabase/functions/horos-api/periods_test.ts

      - name: Type-check local Astro adapter smoke
        run: deno check --config supabase/functions/horos-api/deno.json supabase/functions/horos-api/astro_local_smoke.ts

      - name: Verify hosted Horos v8 boundaries
        env:
          BASE_URL: https://hdaugtypjpniesdgyral.supabase.co/functions/v1/horos-api
        run: |
          set -euo pipefail

          health_code="$(curl --silent --show-error --output /tmp/health.json --write-out '%{http_code}' "$BASE_URL/health")"
          echo "health_code=$health_code"
          cat /tmp/health.json
          echo
          test "$health_code" = "200"
          test "$(jq -r '.status' /tmp/health.json)" = "ok"
          test "$(jq -r '.backend' /tmp/health.json)" = "supabase"
          test "$(jq -r '.astroProvider' /tmp/health.json)" = "skyfield_jpl_de440s"
          test "$(jq -r '.astroProviderConfigured' /tmp/health.json)" = "true"

          protected_code="$(curl --silent --show-error --output /tmp/protected.json --write-out '%{http_code}' "$BASE_URL/profile/me")"
          echo "protected_code=$protected_code"
          cat /tmp/protected.json
          echo
          test "$protected_code" = "401"
          test "$(jq -r '.code' /tmp/protected.json)" = "UNAUTHORIZED"

          webhook_code="$(curl --silent --show-error --output /tmp/webhook.json --write-out '%{http_code}' \
            --request POST \
            --header 'Authorization: Bearer definitely-invalid' \
            --header 'Content-Type: application/json' \
            --data '{"event":{}}' \
            "$BASE_URL/subscription/webhook")"
          echo "webhook_code=$webhook_code"
          cat /tmp/webhook.json
          echo
          test "$webhook_code" = "401"
          test "$(jq -r '.code' /tmp/webhook.json)" = "UNAUTHORIZED_WEBHOOK"

          echo "HOROS_HOSTED_V8_SMOKE=PASS"
