name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Audit hosted deployment repository readiness
        shell: pwsh
        run: ./scripts/audit-hosted-deployment-readiness.ps1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check Expo and legacy Worker
        run: npm run typecheck

      - name: Lint Expo app
        run: npm run lint

      - name: Parse private-beta PowerShell preflight
        shell: pwsh
        run: |
          $content = Get-Content ./scripts/verify-private-beta-local.ps1 -Raw
          [scriptblock]::Create($content) | Out-Null

      - name: Set up Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Type-check Supabase Edge Function
        run: deno check --config supabase/functions/horos-api/deno.json supabase/functions/horos-api/index.ts

      - name: Test Astro gateway contract
        run: deno test --config supabase/functions/horos-api/deno.json supabase/functions/horos-api/astro_test.ts

      - name: Test Horos user-flow contract
        run: deno test --config supabase/functions/horos-api/deno.json supabase/functions/horos-api/user_flow_test.ts

      - name: Test RevenueCat webhook contract
        run: deno test --config supabase/functions/horos-api/deno.json supabase/functions/horos-api/revenuecat_test.ts

      - name: Test atomic profile write contract
        run: deno test --config supabase/functions/horos-api/deno.json supabase/functions/horos-api/profile_write_test.ts

      - name: Test OTP abuse-control contract
        run: deno test --config supabase/functions/horos-api/deno.json supabase/functions/horos-api/auth_rate_test.ts

      - name: Test production CORS contract
        run: deno test --config supabase/functions/horos-api/deno.json supabase/functions/horos-api/cors_test.ts

      - name: Test timezone horoscope periods
        run: deno test --config supabase/functions/horos-api/deno.json supabase/functions/horos-api/periods_test.ts

      - name: Type-check local Astro adapter smoke
        run: deno check --config supabase/functions/horos-api/deno.json supabase/functions/horos-api/astro_local_smoke.ts

      - name: Verify hosted v11 rejects unapproved browser origins
        env:
          BASE_URL: https://hdaugtypjpniesdgyral.supabase.co/functions/v1/horos-api
        run: |
          set -euo pipefail

          assert_no_cors_trust() {
            local headers="$1"
            if grep -Eiq '^access-control-allow-(origin|headers|methods):' "$headers"; then
              echo "Unexpected CORS trust header:"
              cat "$headers"
              exit 1
            fi
            grep -Eiq '^vary:.*origin' "$headers"
          }

          curl --fail --silent --show-error \
            --dump-header /tmp/health-headers.txt \
            --output /tmp/health.json \
            --header 'Origin: https://unapproved.invalid' \
            "$BASE_URL/health"
          test "$(jq -r '.status' /tmp/health.json)" = "ok"
          assert_no_cors_trust /tmp/health-headers.txt

          preflight_code="$(curl --silent --show-error \
            --dump-header /tmp/preflight-headers.txt \
            --output /dev/null \
            --write-out '%{http_code}' \
            --request OPTIONS \
            --header 'Origin: https://unapproved.invalid' \
            --header 'Access-Control-Request-Method: GET' \
            "$BASE_URL/health")"
          test "$preflight_code" = "204"
          assert_no_cors_trust /tmp/preflight-headers.txt

          echo "HOROS_HOSTED_V11_CORS=PASS"
