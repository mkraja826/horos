name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check Expo and legacy Worker
        run: npm run typecheck

      - name: Lint Expo app
        run: npm run lint

      - name: Audit hosted deployment repository readiness
        shell: pwsh
        run: ./scripts/audit-hosted-deployment-readiness.ps1

      - name: Parse private-beta PowerShell preflight
        shell: pwsh
        run: |
          $content = Get-Content ./scripts/verify-private-beta-local.ps1 -Raw
          [scriptblock]::Create($content) | Out-Null

      - name: Set up Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Type-check Supabase Edge Function
        run: deno check --config supabase/functions/horos-api/deno.json supabase/functions/horos-api/index.ts

      - name: Test Astro gateway contract
        run: deno test --config supabase/functions/horos-api/deno.json supabase/functions/horos-api/astro_test.ts

      - name: Test Horos user-flow contract
        run: deno test --config supabase/functions/horos-api/deno.json supabase/functions/horos-api/user_flow_test.ts

      - name: Type-check local Astro adapter smoke
        run: deno check --config supabase/functions/horos-api/deno.json supabase/functions/horos-api/astro_local_smoke.ts
