name: Temporary Expo compatibility diagnostic

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20.19.4"
          cache: npm
      - run: npm install --global npm@10.8.2
      - run: npm ci
      - name: Capture Expo compatibility output
        shell: bash
        run: |
          set +e
          npx expo install --check > expo-compatibility.txt 2>&1
          status=$?
          echo "exitCode=$status" >> expo-compatibility.txt
          cat expo-compatibility.txt
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: expo-compatibility-diagnostic
          path: expo-compatibility.txt
          if-no-files-found: error
          retention-days: 1
